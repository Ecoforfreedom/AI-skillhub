version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: wsr_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wsr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: work_skill_radar
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wsr -d work_skill_radar"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wsr_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://wsr:${POSTGRES_PASSWORD:-changeme}@db:5432/work_skill_radar
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wsr_migrate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://wsr:${POSTGRES_PASSWORD:-changeme}@db:5432/work_skill_radar
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed || true"
    profiles:
      - migrate

  nginx:
    image: nginx:alpine
    container_name: wsr_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    profiles:
      - prod

volumes:
  pgdata:
